# Opportunity Finder (PathFinder, module #2) settings.
[finder]
# Base token to start/end every arbitrage cycle in. WPLS is the canonical
# wrapped native token on PulseChain and has the deepest liquidity.
token_in = "0xA1077a294dDE1B09bB078844df40758a5D0f9a27"
token_in_decimals = 18
# Max swaps per cycle (2 = WPLS->X->WPLS, 3 = WPLS->X->Y->WPLS, ...).
max_hops = 3
# Minimum NET profit (in WPLS, human units) to emit an opportunity.
min_profit = 50000.0
# Cap on trade size (WPLS human units). 0 = unbounded (size = optimal x*).
max_trade_size = 50000000.0
# Flash-loan fee in bps charged on the borrowed notional. 0 = PHUX / own capital.
loan_fee_bps = 0
# Rough gas cost per arb tx, expressed in WPLS human units (placeholder).
gas_cost = 10000.0
# Safety cap on the number of structural cycles enumerated at startup.
max_cycles = 200000
# Redis pub/sub channel opportunities are published to (for the Sender).
output_channel = "opportunities"
# Phase 2 speculative mode. When true, the finder also consumes predicted
# reserves from `pending_updates_channel` (published by the listener's mempool
# watcher) and emits SPECULATIVE opportunities to `speculative_channel`. DEFAULT
# OFF: requires the mempool watcher above AND a broadcaster that can act on
# pre-mine opps (ordering/backrun strategy — not yet implemented). The confirmed
# evaluate-on-update path is unaffected by this flag.
speculative_enabled = false
pending_updates_channel = "pending_updates"
speculative_channel = "opportunities_speculative"

# Transaction Broadcaster (Sender, module #3) settings.
# The signing key is NOT stored here — set the PRIVATE_KEY env var.
[broadcaster]
# Deployed ArbExecutor contract address (see contracts/). REQUIRED.
contract = "0x0cC54381f540A59E75A8736b4699A34CE2fb9536"
# Channel to consume opportunities from (must match finder.output_channel).
opportunities_channel = "opportunities"
# Fixed gas limit per arb tx (no pre-send estimation in fire-and-forget mode).
gas_limit = 800000
# Priority-fee floor (gwei) added on top of the network estimate to win inclusion.
priority_fee_gwei = 5.0
# Hard cap on maxFeePerGas (gwei). MUST stay well above PulseChain's prevailing
# base fee (~500k-600k gwei) or txs become un-includable (EIP-1559 requires
# maxFeePerGas >= block baseFee) and sit in the mempool. This is a spike guard,
# not a normal-operation limit — you only ever pay base+priority, capped here.
max_fee_gwei = 2000000.0
# Drop opportunities older than this many blocks behind the chain tip.
max_opportunity_age_blocks = 2
# Floor passed as the contract's minProfit guard, in raw token_in units. 0 = only
# guarantee no principal loss (gas risk accepted in fire-and-forget mode).
min_profit_raw = "0"
# Pre-send eth_call simulation. true (default) skips any tx that would revert
# on-chain (fee-on-transfer tokens, stale reserves, etc.) before spending gas.
# Costs one extra RPC round-trip per opportunity. Set false to restore pure
# fire-and-forget behavior.
simulate = true
# Blocks to wait for a sent tx to mine before fee-bumping and resending it at the
# same nonce. With ~10s blocks, 1 means "bump if not mined in the next block".
replace_after_blocks = 1
# Max fee-bump resends per nonce before giving up (each bump is +12.5%, capped by
# max_fee_gwei). The bumps escalate the fee until the tx lands or hits the cap.
max_replacements = 5
