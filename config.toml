# Mempool watcher (Phase 2, listener). Predicts reserve changes from PENDING
# swap txs before they mine and publishes them on `channel` for the finder's
# speculative path. DEFAULT OFF: public RPC nodes usually reject pending-tx
# subscriptions, so this needs an owned node. The watcher degrades gracefully
# (logs a warning and disables itself) if the node rejects the subscription.
[mempool]
enabled = false
channel = "pending_updates"

[[dexes]]
name = "pulsex_v2"
enabled = true
factory = "0x29eA7545DEf87022BAdc76323F373EA1e707C523"
