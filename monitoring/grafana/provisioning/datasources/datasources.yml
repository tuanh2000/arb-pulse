apiVersion: 1

datasources:
  # Time-series metrics scraped from every service + infra exporters.
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: 5s

  # Live JSON reads for the Pool State page. Hits the listener (live reserves)
  # and pool-registry (TVL) HTTP APIs running on the host. Requires the
  # yesoreyeram-infinity-datasource plugin (installed via GF_INSTALL_PLUGINS).
  - name: Infinity
    uid: infinity
    type: yesoreyeram-infinity-datasource
    access: proxy
    isDefault: false
    jsonData:
      global_queries: []
