[network]
rpc_http = "https://pulsechain-rpc.publicnode.com"

# DEX factories to enumerate — mirrors listener config but only needs factory address + name
[[dexes]]
name = "pulsex_v2"
enabled = true
factory = "0x29eA7545DEf87022BAdc76323F373EA1e707C523"

# Verified on-chain: 64,919 pairs.
[[dexes]]
name = "pulsex_v1"
enabled = true
factory = "0x1715a3E4A142d8b698131108995174F37aEBA10D"

[[dexes]]
name = "nineinch_v2"
enabled = true
factory = "0x3a0Fa7884dD93f3cd234bBE2A0958Ef04b05E13b"

# TODO: needs the REAL 9mm V2 factory — this address is 9inch's (3,499 pairs),
# not 9mm's. Disabled until the correct factory is set. Enable once verified.
[[dexes]]
name = "ninemm_v2"
enabled = false
factory = "0x3a0Fa7884dD93f3cd234bBE2A0958Ef04b05E13b"

[database]
url = "postgresql://arbpulse:arbpulse@localhost:5432/arbpulse"
max_connections = 10

[api]
host = "127.0.0.1"
port = 3001

[worker]
# pools to fetch per batch from DB (ordered by updated_at ASC)
batch_size = 100
# seconds to sleep when no pools need processing
idle_sleep_secs = 30
# milliseconds to sleep between Multicall3 batches (RPC throttle)
batch_delay_ms = 200

[price_updater]
# Seconds between full token price refreshes (on-chain reserve oracle)
refresh_interval_secs = 300
# Minimum USD on a pool's anchor side for its price to be trusted. Lower = more
# (smaller) tokens priced but noisier; higher = only deep, well-capitalized pools.
min_anchor_liquidity_usd = 100.0

[filter]
min_tvl_usd = 200.0

[[filter.anchor_tokens]]
address = "0xA1077a294dDE1B09bB078844df40758a5D0f9a27"
